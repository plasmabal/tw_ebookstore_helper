<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Wishlist Fixture</title>
</head>
<body>
  <ul class="cart-list-item-list">
    <li class="cart-list-item">
      <a class="item-cover-link" href="https://readmoo.com/book/12345">
        <img src="" alt="封面">
      </a>
      <div class="item-detail-content">
        <div class="item-contributor-box">測試作者 A</div>
      </div>
      <div class="item-price-box">
        <div class="item-price-box__main">
          <div class="item-price" role="text" aria-label="單價299元">NT$ 299</div>
        </div>
      </div>
      <button class="btn-remove">移除</button>
    </li>
    <li class="cart-list-item">
      <a class="item-cover-link" href="https://readmoo.com/book/67890">
        <img src="" alt="封面">
      </a>
      <div class="item-detail-content">
        <div class="item-contributor-box">測試作者 B</div>
      </div>
      <div class="item-price-box">
        <div class="item-price-box__main">
          <div class="item-price" role="text" aria-label="單價180元">NT$ 180</div>
        </div>
      </div>
      <button class="btn-remove">移除</button>
    </li>
  </ul>
</body>
</html>
