<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>台灣電子書商小幫手 - 設定</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <h1>⚙️ 黑名單管理</h1>
  <p class="description">在此新增您想要過濾的出版社或作者。符合名單的書籍將會在網頁上打叉並變暗。</p>

  <div class="container">
    <div class="section">
      <h2>🏢 出版社黑名單</h2>
      <div class="input-group">
        <input type="text" id="pub-input" placeholder="輸入出版社完整名稱...">
        <button id="add-pub">新增</button>
      </div>
      <ul id="pub-list" class="list"></ul>
    </div>

    <div class="section">
      <h2>✍️ 作者/譯者黑名單</h2>
      <div class="input-group">
        <input type="text" id="author-input" placeholder="輸入作者完整名稱...">
        <button id="add-author">新增</button>
      </div>
      <ul id="author-list" class="list"></ul>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
